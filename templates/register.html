<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register StressZen</title>
</head>
<style>
        :root {
            --primary: #5e72e4;
            --primary-dark: #4a5acf;
            --secondary: #11cdef;
        }
        
        body {
            background-image: url(p8.jpeg);
            background-repeat: no-repeat;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            background-image: url("{{ url_for('static', filename='p8.jpeg') }}");
            background-repeat: no-repeat;
            background-size: cover;
            
        }
        
        .auth-container {
            max-width: 500px;
            margin: 5rem auto;
            background: rgb(249, 248, 248,0.5);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .auth-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .auth-form {
            padding: 2rem;
        }
        
        .form-control {
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
        }
        
        .btn-auth {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 5px;
            font-weight: 600;
        }
        
        .btn-auth:hover {
            background: var(--primary-dark);
        }
        
        .auth-footer {
            text-align: center;
            padding: 1rem;
            border-top: 1px solid #eee;
        }
    </style>
<body>
    <!-- Similar to login.html but with registration fields -->
<div class="auth-container">
    <div class="auth-header">
        <h2><i class="fas fa-brain"></i> StressZen</h2>
        <p>Create your account</p>
    </div>
    
    <div class="auth-form">
        {% if error %}
        <div style="color:red; text-align:center; margin-bottom:10px;">
            {{ error }}
        </div>
        {% endif %}
        <form method="POST" action="/register">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirm_password" required>
            </div>
            
            <button type="submit" class="btn btn-auth">Sign Up</button>
        </form>
    </div>
    
    <div class="auth-footer">
        <p>Already have an account? <a href="/login">Sign in</a></p>
    </div>
</div>

</body>
</html>
