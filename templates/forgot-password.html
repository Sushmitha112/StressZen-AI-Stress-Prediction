<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | StressZen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #5e72e4;
            --primary-dark: #4a5acf;
            --secondary: #11cdef;
        }
        
        body {
            background: #f5f7fb;
            font-family: 'Poppins', sans-serif;
        }
        
        .auth-container {
            max-width: 500px;
            margin: 5rem auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .auth-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .auth-form {
            padding: 2rem;
        }
        
        .form-control {
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
        }
        
        .btn-auth {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 5px;
            font-weight: 600;
        }
        
        .btn-auth:hover {
            background: var(--primary-dark);
        }
        
        .auth-footer {
            text-align: center;
            padding: 1rem;
            border-top: 1px solid #eee;
        }
        
        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        
        .success-message i {
            font-size: 3rem;
            color: var(--success);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h2><i class="fas fa-brain"></i> StressZen</h2>
            <p>Reset your password</p>
        </div>
        
        <div class="auth-form" id="resetForm">
            <div class="mb-3">
                <p>Enter your email and we'll send you a link to reset your password.</p>
            </div>
            
            <form id="forgotPasswordForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                
                <button type="submit" class="btn btn-auth">Send Reset Link</button>
            </form>
        </div>
        
        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i>
            <h3>Reset Email Sent!</h3>
            <p>We've sent a password reset link to your email address.</p>
            <p>Please check your inbox and follow the instructions.</p>
            <a href="login.html" class="btn btn-auth mt-3">Back to Login</a>
        </div>
        
        <div class="auth-footer">
            <p>Remember your password? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            // In a real app, you would send this to your backend
            console.log('Password reset requested for:', email);
            
            // Simulate sending email (show success message)
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            
            // In a real implementation, you would:
            // 1. Validate the email exists in your system
            // 2. Generate a unique reset token
            // 3. Send email with reset link (to reset-password.html?token=XYZ)
            // 4. Store the token in your database with expiration
        });
        
        // Check if coming from email link with token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if(token) {
            // This would verify the token and show a password reset form
            document.getElementById('resetForm').innerHTML = `
                <form id="resetPasswordForm">
                    <input type="hidden" id="token" value="${token}">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="newPassword" required minlength="8">
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirmPassword" required>
                    </div>
                    <button type="submit" class="btn btn-auth">Reset Password</button>
                </form>
            `;
            
            document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if(newPassword !== confirmPassword) {
                    alert('Passwords do not match!');
                    return;
                }
                
                // In a real app, send token and new password to your backend
                console.log('Password reset with token:', token);
                
                // Show success message
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('successMessage').innerHTML = `
                    <i class="fas fa-check-circle"></i>
                    <h3>Password Updated!</h3>
                    <p>Your password has been successfully reset.</p>
                    <a href="login.html" class="btn btn-auth mt-3">Login with New Password</a>
                `;
                document.getElementById('successMessage').style.display = 'block';
            });
        }
    </script>
</body>
</html>
